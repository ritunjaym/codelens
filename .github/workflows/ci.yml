name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  solid-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd apps/web-solid && npm ci
      - run: cd apps/web-solid && npm run build

  solid-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd apps/web-solid && npm ci
      - run: cd apps/web-solid && npm test

  solid-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd apps/web-solid && npm ci
      - run: cd apps/web-solid && npx tsc --noEmit
