name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  solid-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd apps/web-solid && npm install --no-workspaces
      - run: cd apps/web-solid && npm run build

  solid-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd apps/web-solid && npm install --no-workspaces
      - run: cd apps/web-solid && npm test

  solid-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd apps/web-solid && npm install --no-workspaces
      - run: cd apps/web-solid && npx tsc --noEmit

  ml-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest numpy structlog rank_bm25
      - run: pytest ml/eval/test_metrics.py ml/eval/tests/ -v
