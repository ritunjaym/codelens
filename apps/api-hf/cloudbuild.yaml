steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/codelens-api/codelens-api:latest'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/codelens-api/codelens-api:latest'
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
