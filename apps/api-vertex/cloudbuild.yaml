steps:
  # Step 1: Download the INT8 ONNX model from GCS into the build workspace
  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - 'cp'
      - 'gs://codelens-models-upbeat/reranker/model_int8.onnx'
      - 'model_int8.onnx'

  # Step 2: Build the image (model file is now in build context)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/codelens-api/codelens-vertex:latest'
      - '.'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/codelens-api/codelens-vertex:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  diskSizeGb: 20
